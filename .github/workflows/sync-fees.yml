name: Sync Delivery Fees

on:
  schedule:
    # Ruleaza o data la 6 ore (la minutul 0 din orele 0, 6, 12, 18)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Permite rularea manuala din interfata GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Sync Endpoint
        run: |
          echo "Triggering sync at ${{ secrets.RAILWAY_URL }}/api/admin/delivery-fees/sync"
          curl -X POST "${{ secrets.RAILWAY_URL }}/api/admin/delivery-fees/sync" \
            -H "x-sync-token: ${{ secrets.DELIVERY_FEES_SYNC_TOKEN }}" \
            -H "Content-Type: application/json"
